<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suggessness | Recuperar contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body class="auth-body">
  <main class="auth-layout">
    <section class="auth-left">
      <span class="brand-chip">Recuperación de acceso</span>
      <h1 class="brand-title">Suggestness</h1>
      <p class="brand-copy">
        Simulación de recuperación de contraseña para el mockup del sistema.
      </p>
    </section>

    <section class="auth-card">
      <h2>¿Olvidaste tu contraseña?</h2>
      <p class="muted">Escribe tu correo para validar si coincide con el usuario configurado.</p>

      <form id="forgotForm" novalidate>
        <div class="field">
          <label for="recoveryEmail">Correo electrónico</label>
          <input id="recoveryEmail" type="email" placeholder="tucorreo@farmacia.com" required>
        </div>

        <button type="submit" class="btn-primary">Enviar recuperación</button>
        <p id="forgotMessage" class="message success hidden"></p>
      </form>

      <a href="./index.html" class="btn-soft btn-link back-link">Volver al login</a>
    </section>
  </main>

  <script src="./src/app.js" defer></script>
</body>
</html>
