<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suggessness | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body class="auth-body">
  <main class="auth-layout">
    <section class="auth-left">
      <span class="brand-chip">Software para farmacia</span>
      <h1 class="brand-title">Suggessness</h1>
      <p class="brand-copy">
        Sistema para controlar inventario, compras y gestión operativa de tu farmacia.
      </p>
    </section>

    <section class="auth-card">
      <h2>Iniciar sesión</h2>
      <p class="muted">
        Ingresa con el correo y contraseña definidos por ti en <strong>src/app.js</strong>.
      </p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input id="email" type="email" placeholder="tucorreo@farmacia.com" required>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="Tu contraseña" required>
        </div>

        <div class="links-row">
          <a href="./forgot-password.html">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-primary">Entrar</button>
        <p id="loginMessage" class="message error hidden"></p>

        <div class="links-row bottom-link">
          <a href="https://samuelleyton2006.github.io/PublicidadSuggessness/" target="_blank" rel="noopener noreferrer">
            ¿No estás registrado?
          </a>
        </div>
      </form>
    </section>
  </main>

  <script src="./src/app.js" defer></script>
</body>
</html>
